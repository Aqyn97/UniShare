spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: pm-project

  datasource:
    driver-class-name: org.postgresql.Driver
    # Defaults to local docker-compose (5433). Override via .env for Neon or local setup.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/pm_project_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: 'classpath:db.migration'

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

logging:
  level:
    org.flywaydb: INFO

server:
  port: ${PORT:8080}
  address: 0.0.0.0

cloudinary:
  cloudName: ${CLOUDINARY_CLOUD_NAME:}
  apiKey: ${CLOUDINARY_API_KEY:}
  apiSecret: ${CLOUDINARY_API_SECRET:}

app:
  auth:
    frontend-base-url: ${APP_AUTH_FRONTEND_BASE_URL:http://localhost:5173}
    mail-mode: ${APP_AUTH_MAIL_MODE:log}
    mail-from: ${APP_AUTH_MAIL_FROM:no-reply@unishare.local}
    verification-ttl-hours: ${APP_AUTH_VERIFICATION_TTL_HOURS:24}
    password-reset-ttl-minutes: ${APP_AUTH_PASSWORD_RESET_TTL_MINUTES:30}
